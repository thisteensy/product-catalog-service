spring:
  application:
    name: product-validation-service
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/music_catalog}
    username: ${DB_USERNAME:catalog}
    password: ${DB_PASSWORD:catalog}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
